<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>물고기를 잡는 방법 후기</title>
  <meta name="description" content="물고기를 잡는 방법 실제 구매자 후기 모음" />
  <style>
    :root {
      --bg: #07090f;
      --bg2: #0d1220;
      --text: #f7f7fb;
      --muted: #aab2c8;
      --line: rgba(255, 255, 255, 0.13);
      --accent: #d7b06a;
      --accent2: #fff2c4;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 0%, rgba(215, 176, 106, 0.18), transparent 32%),
        radial-gradient(circle at 88% 12%, rgba(82, 116, 255, 0.15), transparent 34%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 48%, #05060a 100%);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(to bottom, black, transparent 82%);
    }

    .page {
      position: relative;
      width: min(100%, 1080px);
      margin: 0 auto;
      padding: 72px 18px 54px;
    }

    header {
      text-align: center;
      margin: 0 auto 34px;
      padding: 44px 22px 38px;
      border: 1px solid var(--line);
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(255,255,255,.11), rgba(255,255,255,.045));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
      position: relative;
    }

    header::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      right: -115px;
      top: -130px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(215,176,106,.23), transparent 70%);
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border: 1px solid rgba(215,176,106,.38);
      border-radius: 999px;
      background: rgba(215,176,106,.12);
      color: var(--accent2);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(38px, 7vw, 78px);
      line-height: 1.02;
      letter-spacing: -0.07em;
      word-break: keep-all;
    }

    .subtitle {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: clamp(16px, 2.8vw, 21px);
      word-break: keep-all;
    }

    .reviews {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      margin-top: 28px;
    }

    .review-card {
      margin: 0;
      border-radius: var(--radius);
      padding: 10px;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(255,255,255,.105), rgba(255,255,255,.035));
      box-shadow: 0 20px 52px rgba(0, 0, 0, .30);
      overflow: hidden;
      transition: border-color .25s ease, transform .25s ease, background .25s ease;
    }

    .review-card:hover {
      transform: translateY(-3px);
      border-color: rgba(215,176,106,.42);
      background: linear-gradient(135deg, rgba(255,255,255,.135), rgba(255,255,255,.05));
    }

    .image-button {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      border-radius: calc(var(--radius) - 10px);
      overflow: hidden;
      background: transparent;
      cursor: zoom-in;
    }

    .review-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: calc(var(--radius) - 10px);
      background: #cbd4e3;
    }

    .reveal {
      opacity: 0;
      transform: translateY(34px) scale(.985);
      filter: blur(8px);
      transition: opacity .75s ease, transform .75s cubic-bezier(.2,.8,.2,1), filter .75s ease;
      transition-delay: var(--delay, 0ms);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    footer {
      margin-top: 40px;
      padding: 26px 18px 8px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    footer strong { color: var(--text); font-weight: 800; }
    footer a { color: var(--accent2); text-decoration: none; font-weight: 700; }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(0, 0, 0, .82);
      backdrop-filter: blur(10px);
    }

    .lightbox.is-open { display: grid; }

    .lightbox img {
      max-width: min(1100px, 96vw);
      max-height: 90vh;
      width: auto;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 30px 90px rgba(0,0,0,.55);
      background: #fff;
    }

    .lightbox button {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      color: white;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
    }

    @media (min-width: 860px) {
      .reviews { gap: 26px; }
      .review-card { padding: 12px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .reveal { opacity: 1; transform: none; filter: none; transition: none; }
      .review-card { transition: none; }
    }
  </style>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button type="button" id="closeLightbox" aria-label="닫기">×</button>
    <img id="lightboxImage" alt="확대된 후기 이미지">
  </div>

  <script>
    const revealTargets = document.querySelectorAll('.reveal');

    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.16, rootMargin: '0px 0px -8% 0px' });

      revealTargets.forEach((target) => observer.observe(target));
    } else {
      revealTargets.forEach((target) => target.classList.add('is-visible'));
    }

    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');
    const closeLightbox = document.getElementById('closeLightbox');

    document.querySelectorAll('.image-button img').forEach((img) => {
      img.addEventListener('click', () => {
        lightboxImage.src = img.src;
        lightboxImage.alt = img.alt;
        lightbox.classList.add('is-open');
        lightbox.setAttribute('aria-hidden', 'false');
      });
    });

    function closeModal() {
      lightbox.classList.remove('is-open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.removeAttribute('src');
    }

    closeLightbox.addEventListener('click', closeModal);
    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) closeModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && lightbox.classList.contains('is-open')) closeModal();
    });
  </script>
